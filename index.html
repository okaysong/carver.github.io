<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的数字足迹</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; color: #333; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category { font-size: 0.8em; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .title a { color: #0366d6; text-decoration: none; font-weight: bold; }
        .title a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🌟 我的数字生活仪表盘</h1>
    <div id="timeline">加载中...</div>

    <script>
        // 前端自动拉取最新的 JSON 数据并渲染
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('timeline');
                container.innerHTML = ''; // 清空加载提示
                
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="category">${item.category}</div>
                        <div class="title"><a href="${item.link}" target="_blank">${item.title}</a></div>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => {
                document.getElementById('timeline').innerHTML = '数据加载失败。';
            });
    </script>
</body>
</html>
