<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的数字足迹 | My Life OS</title>
    <style>
        /* 🌟 定义一套现代极简的颜色变量 */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent: #0984e3;
            --card-border: rgba(0,0,0,0.03);
            --card-shadow: rgba(0,0,0,0.04);
            --tag-bg: rgba(9, 132, 227, 0.1);
        }

        /* 🌙 魔法：自动暗黑模式跟随系统 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --card-bg: #2d2d2d;
                --text-main: #f5f6fa;
                --text-muted: #a4b0be;
                --accent: #74b9ff;
                --card-border: rgba(255,255,255,0.05);
                --card-shadow: rgba(0,0,0,0.3);
                --tag-bg: rgba(116, 185, 255, 0.15);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px var(--card-shadow);
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        #timeline {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px var(--card-shadow), 0 1px 3px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .category {
            font-size: 0.85em;
            font-weight: 600;
            background: var(--tag-bg);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .time {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .title {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .title a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        .title a:hover {
            color: var(--accent);
        }

        .note {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px dashed var(--card-border);
            white-space: pre-wrap;
        }

        .loading, .empty-state {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 40px;
        }
    </style>
</head>
<body>
    <h1>🌟 我的数字生活仪表盘</h1>
    
    <div id="filter-container" class="filter-bar"></div>
    
    <div id="timeline"><div class="loading">正在同步宇宙信号... 📡</div></div>

    <script>
        let allData = [];

        // 🕰️ 锁定并格式化为东八区时间 (带历史数据兼容补丁)
        function formatDate(isoString) {
            if (!isoString) return '';
            
            // 🔧 兼容补丁：如果历史数据没带 Z 且没有时区偏移(+)，强制当做 UTC (Z) 处理
            let timeToParse = isoString;
            if (!timeToParse.endsWith('Z') && !timeToParse.includes('+')) {
                timeToParse += 'Z'; 
            }
            
            const date = new Date(timeToParse);
            
            const options = {
                timeZone: 'Asia/Shanghai', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                hour12: false
            };
            
            let timeString = new Intl.DateTimeFormat('zh-CN', options).format(date);
            return `${timeString} (UTC+8)`;
        }

        // 🧹 魔法净化器：专门清洗 Goodreads 的长串英文乱码
        function cleanNote(category, rawNote) {
            if (!rawNote) return '';
            
            if (category === '📚 阅读') {
                let author = rawNote.match(/author:\s*(.*?)\s*name:/) ? rawNote.match(/author:\s*(.*?)\s*name:/)[1] : '';
                let rating = rawNote.match(/average rating:\s*([\d.]+)/) ? rawNote.match(/average rating:\s*([\d.]+)/)[1] : '';
                let year = rawNote.match(/book published:\s*(\d+)/) ? rawNote.match(/book published:\s*(\d+)/)[1] : '';
                
                let cleanText = [];
                if (author) cleanText.push(`作者: ${author}`);
                if (rating) cleanText.push(`评分: ${rating}`);
                if (year) cleanText.push(`出版年份: ${year}`);
                
                return cleanText.length > 0 ? cleanText.join(' | ') : rawNote;
            }
            
            return rawNote;
        }

        function renderFilters() {
            const filterContainer = document.getElementById('filter-container');
            filterContainer.innerHTML = ''; 

            const categories = ['全部', ...new Set(allData.map(item => item.category))];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                if (cat === '全部') btn.classList.add('active'); 
                btn.innerText = cat;
                
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderTimeline(cat);
                };
                
                filterContainer.appendChild(btn);
            });
        }

        function renderTimeline(filterCategory) {
            const container = document.getElementById('timeline');
            container.innerHTML = ''; 

            const displayData = filterCategory === '全部' 
                ? allData 
                : allData.filter(item => item.category === filterCategory);

            if (displayData.length === 0) {
                container.innerHTML = '<div class="empty-state">这个分类下还没有数据哦 📭</div>';
                return;
            }

            displayData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                
                const cleanedNote = cleanNote(item.category, item.note);
                const noteHtml = cleanedNote ? `<div class="note">${cleanedNote}</div>` : '';
                
                div.innerHTML = `
                    <div class="card-header">
                        <span class="category">${item.category}</span>
                        <span class="time">${formatDate(item.time)}</span>
                    </div>
                    <div class="title"><a href="${item.link}" target="_blank">${item.title}</a></div>
                    ${noteHtml}
                `;
                container.appendChild(div);
            });
        }

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // 🔧 排序补丁：排序时同样要处理历史数据的时区缺失问题
                data.sort((a, b) => {
                    let timeA = a.time + (!a.time.endsWith('Z') && !a.time.includes('+') ? 'Z' : '');
                    let timeB = b.time + (!b.time.endsWith('Z') && !b.time.includes('+') ? 'Z' : '');
                    return new Date(timeB) - new Date(timeA);
                });

                allData = data; 
                renderFilters(); 
                renderTimeline('全部'); 
            })
            .catch(error => {
                document.getElementById('timeline').innerHTML = '<div class="loading">获取数据失败，请检查网络 ❌</div>';
            });
    </script>
</body>
</html>
