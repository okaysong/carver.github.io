name: 自动更新数字足迹

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时执行一次
  workflow_dispatch: # 允许你手动点击一个按钮强制运行测试

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许脚本将新数据写回仓库

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 👇 合并了依赖包，同时安装 feedparser 和 requests
      - name: 安装依赖
        run: pip install feedparser requests

      # 👇 带有 Strava 密钥的运行脚本环节
      - name: 运行抓取脚本
        env: 
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python fetch_data.py

      - name: 自动提交更新的 data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动更新数字足迹 (GitHub Actions)"
